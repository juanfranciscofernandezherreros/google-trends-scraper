name: Explore Trends

on:
  workflow_dispatch:
    inputs:
      geo:
        description: 'Geographic region code (e.g. ES, US, GB)'
        required: false
        default: 'ES'
      hl:
        description: 'Language/locale (e.g. es-ES, en-GB)'
        required: false
        default: 'es-ES'
      query:
        description: 'Search term or topic ID (e.g. /m/0dvkx or "football")'
        required: false
        default: '/m/0dvkx'

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run explore scraper
        run: node index.js explore "${{ github.event.inputs.geo }}" "${{ github.event.inputs.hl }}" "${{ github.event.inputs.query }}"
